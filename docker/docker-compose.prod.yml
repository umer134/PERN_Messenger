name: pern-messenger

services:
  postgres:
    image: postgres:17

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ../server
      dockerfile: Dockerfile.prod

    volumes:
      - uploads_data:/app/uploads

    restart: unless-stopped

    env_file:
      - ../server/.env.production

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:5002/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile

    restart: unless-stopped

    depends_on:
      - server

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ${SSL_CERT_PATH}/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - ${SSL_KEY_PATH}/privkey.pem:/etc/nginx/ssl/privkey.pem:ro

volumes:
  postgres_data:
  uploads_data:
